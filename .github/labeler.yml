build:
  - changed-files:
      - any-glob-to-any-file:
          - vite.config.js

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - composer.json
          - package.json

javascript:
  - changed-files:
      - any-glob-to-any-file:
          - resources/js/**/*.js

php:
  - changed-files:
      - any-glob-to-any-file:
          - functions.php
          - app/**/*.php

views:
  - changed-files:
      - any-glob-to-any-file:
          - index.php
          - resources/views/**/*.blade.php
